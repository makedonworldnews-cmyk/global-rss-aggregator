name: RSS Aggregator
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout код
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Инсталирај зависимости
        run: npm install

      - name: Изврши ја скриптата за RSS
        run: npm run fetch

      - name: Конфигурирај Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit и Push промени
        run: |
          git add data/feeds.json
          if ! git diff --staged --quiet; then
            git pull --rebase origin main || true
            git commit -m "auto: ажурирање на вести [skip ci]" || echo "Веќе комитирано"
            git push origin main || echo "Push неуспешен"
          else
            echo "✅ Нема нови промени."
          fi
